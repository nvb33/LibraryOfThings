name: Documentation

on:
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Doxygen
        run: sudo apt-get install -y doxygen graphviz

      - name: Create Doxyfile
        run: |
          cat > Doxyfile << 'EOF'
          PROJECT_NAME           = "Library of Things"
          OUTPUT_DIRECTORY       = html
          INPUT                  = StarterApp StarterApp.Database
          RECURSIVE              = YES
          EXTRACT_ALL            = YES
          FILE_PATTERNS          = *.cs
          GENERATE_HTML          = YES
          GENERATE_LATEX         = NO
          HTML_OUTPUT            = .
          HAVE_DOT               = YES
          QUIET                  = YES
          EOF

      - name: Generate Doxygen Documentation
        run: doxygen Doxyfile

      - name: Upload documentation as artifact
        uses: actions/upload-artifact@v4
        with:
          name: doxygen-docs
          path: html