name: Build & Test

on: [pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore workloads
        run: dotnet workload restore ./StarterApp/StarterApp.csproj

      - name: Restore dependencies
        run: dotnet restore ./StarterApp.Tests/StarterApp.Tests.csproj

      - name: Build project
        run: dotnet build ./StarterApp/StarterApp.csproj --framework net10.0

      - name: Run tests
        run: dotnet test ./StarterApp.Tests/StarterApp.Tests.csproj --framework net10.0

      - name: Build APK
        run: dotnet build ./StarterApp/StarterApp.csproj -f net10.0-android -c Release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: starterapp-release
          path: StarterApp/bin/Release/net10.0-android/*.apk