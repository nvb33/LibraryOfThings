name: Build & Test

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install SonarCloud scanner
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Restore workloads
        run: dotnet workload restore ./StarterApp/StarterApp.csproj

      - name: Restore dependencies
        run: dotnet restore ./StarterApp.Tests/StarterApp.Tests.csproj

      - name: Begin SonarCloud analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          dotnet-sonarscanner begin \
            /k:"nvb33_LibraryOfThings" \
            /o:"nvb33" \
            /d:sonar.token="${{ secrets.SONAR_TOKEN }}" \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.cs.opencover.reportsPaths="**/TestResults/**/coverage.opencover.xml" \
            /d:sonar.exclusions="**/obj/**,**/bin/**,**/Migrations/**,**/*.xaml" \
            /d:sonar.coverage.exclusions="**/*.xaml.cs,**/MauiProgram.cs,**/App.xaml.cs,**/AppShell.xaml.cs,**/Platforms/**,**/Services/ApiService.cs,**/Services/LocationService.cs,**/Services/NavigationService.cs,**/Services/ApiAuthenticationService.cs,**/Services/AuthenticationService.cs,**/Services/AuthResult.cs,**/Services/AuthStateChangedEventArgs.cs,**/Services/IApiService.cs,**/Services/IAuthenticationService.cs,**/Services/ILocationService.cs,**/Services/INavigationService.cs,**/Services/IRentalService.cs,**/Services/IReviewService.cs,**/Converters/**,**/Data/AppDbContext.cs,**/Data/AppDbContextFactory.cs,**/Migrations/**,**/Models/Role.cs,**/Models/UserRole.cs,**/Models/RoleConstants.cs,**/Models/User.cs,**/Models/Category.cs,**/ViewModels/LoginViewModel.cs,**/ViewModels/RegisterViewModel.cs,**/ViewModels/UserDetailViewModel.cs,**/ViewModels/AppShellViewModel.cs,**/ViewModels/MainViewModel.cs,**/ViewModels/TempViewModel.cs,**/ViewModels/UserListViewModel.cs,**/ViewModels/ProfileViewModel.cs,**/ViewModels/AboutViewModel.cs,**/ViewModels/BaseViewModel.cs"

      - name: Build project
        run: dotnet build ./StarterApp/StarterApp.csproj --framework net10.0

      - name: Run tests with coverage
        run: |
          dotnet test ./StarterApp.Tests/StarterApp.Tests.csproj \
            --framework net10.0 \
            --collect:"XPlat Code Coverage" \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover

      - name: End SonarCloud analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: dotnet-sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"

      - name: Build APK
        run: dotnet build ./StarterApp/StarterApp.csproj -f net10.0-android -c Release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: starterapp-release
          path: StarterApp/bin/Release/net10.0-android/*.apk